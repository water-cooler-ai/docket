name: CI

on:
  push:
    branches: [main, "v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Optional Postgres deps present — the default experience.
          - name: full
            core_only: ""
          # Core-only host: no ecto_sql/postgrex. See CONTRIBUTING.md.
          - name: core
            core_only: "1"
    env:
      DOCKET_CORE_ONLY: ${{ matrix.core_only }}
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ matrix.name }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ matrix.name }}-

      - run: mix deps.get

      - run: mix compile --warnings-as-errors

      - run: mix test

  postgres:
    name: live Postgres ${{ matrix.postgres }} release leg
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ["13", "17"]
    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: runner
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runner"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      PGUSER: runner
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.18"
          otp-version: "27"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-postgres-${{ matrix.postgres }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-postgres-${{ matrix.postgres }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test --include postgres
